# 시크릿 정규식
# Stage A: 파싱 직후 turn 본문에 정규식 매칭 → 검출 시 [REDACTED] 치환
# Stage D 검증: 보고서 후처리에서 다시 확인 → 검출 시 CRITICAL

secret_patterns:
  - name: "AWS Access Key"
    pattern: "AKIA[0-9A-Z]{16}"

  - name: "AWS Secret Key"
    pattern: "[a-zA-Z0-9+/]{40}"
    context_required: "aws_secret"

  - name: "JWT"
    pattern: 'eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'

  - name: "Generic API Key"
    pattern: '(api[_-]?key|token|secret)["'']?\s*[:=]\s*["'']?([a-zA-Z0-9_-]{20,})'

  - name: "Bearer Token"
    pattern: 'Bearer\s+[A-Za-z0-9_-]+'

  - name: "Private Key"
    pattern: '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'

  - name: "URL with Password"
    pattern: '[a-z]+://[^:]+:[^@]+@'

  - name: "Slack Token"
    pattern: 'xox[bpoa]-[0-9]{12}-[0-9]{12}-[a-zA-Z0-9]{24}'

  - name: "GitHub Token"
    pattern: 'gh[ps]_[A-Za-z0-9]{36}'
